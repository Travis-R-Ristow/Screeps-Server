# Screeps Private Server Configuration
# Documentation: https://github.com/screepers/screeps-launcher

# Node.js version - REQUIRED: screeps@4.3.0 needs Node >=22.9.0
nodeVersion: "Jod"

# Environment variables passed to child processes
env:
  shared:
    MODFILE: mods.json
    STORAGE_HOST: redis
    STORAGE_PORT: "21027"
  backend:
    GAME_HOST: 0.0.0.0
    GAME_PORT: "21025"
    CLI_HOST: 0.0.0.0
    CLI_PORT: "21026"
    ASSET_DIR: assets
  engine:
    DRIVER_MODULE: "@screeps/driver"
  storage: {}

# Pin packages to prevent compatibility issues
pinnedPackages:
  ssri: 8.0.1
  cacache: 15.3.0
  passport-steam: 1.0.17
  minipass-fetch: 2.1.2
  express-rate-limit: 6.7.0

# Mods to load
mods:
  - screepsmod-auth
  - screepsmod-admin-utils
  - screepsmod-mongo

# Server options (requires screepsmod-admin-utils)
serverConfig:
  tickRate: 1000
  welcomeText: 'Welcome to the private test server — configured for official MMO parity.'
